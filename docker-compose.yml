services:
  speedcat:
    build:
      context: .
      dockerfile: Dockerfile
    image: speedcat-scclient:1.33.12
    container_name: speedcat-scclient
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    shm_size: "512m"
    ports:
      - "${NOVNC_BIND_ADDR:-0.0.0.0}:${NOVNC_HOST_PORT:-6080}:6080"
      - "${PROXY_BIND_ADDR:-0.0.0.0}:${PROXY_SOCKS_HOST_PORT:-6454}:6454"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MODE: ${MODE:-gui}
      ENABLE_VNC: ${ENABLE_VNC:-1}
      ENABLE_NOVNC: ${ENABLE_NOVNC:-1}
      VNC_PORT: ${VNC_PORT:-5900}
      NOVNC_PORT: ${NOVNC_PORT:-6080}
      UI_PASSWORD: ${UI_PASSWORD:-}
      XVFB_WHD: ${XVFB_WHD:-1280x800x24}
      CONFIG_DIR: ${CONFIG_DIR:-/data/config}
      CONFIG_FILE: ${CONFIG_FILE:-/data/config/config.yaml}
    volumes:
      - ./data:/data
