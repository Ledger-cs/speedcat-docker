services:
  speedcat:
    image: ${SPEEDCAT_IMAGE:-einfash/speedcat-scclient:1.33.12}
    pull_policy: ${SPEEDCAT_PULL_POLICY:-if_not_present}
    container_name: speedcat-scclient
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:true
    shm_size: "512m"
    ports:
      - "${NOVNC_BIND_ADDR:-127.0.0.1}:${NOVNC_HOST_PORT:-6080}:6080"
      - "${PROXY_BIND_ADDR:-127.0.0.1}:${PROXY_SOCKS_HOST_PORT:-6454}:6454"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MODE: ${MODE:-gui}
      ENABLE_VNC: ${ENABLE_VNC:-1}
      ENABLE_NOVNC: ${ENABLE_NOVNC:-1}
      ENABLE_FILE_LOGS: ${ENABLE_FILE_LOGS:-0}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      FILE_LOG_MAX_BYTES: ${FILE_LOG_MAX_BYTES:-10485760}
      FILE_LOG_MAX_FILES: ${FILE_LOG_MAX_FILES:-3}
      VNC_PORT: ${VNC_PORT:-5900}
      NOVNC_PORT: ${NOVNC_PORT:-6080}
      NOVNC_BACKEND_PORT: ${NOVNC_BACKEND_PORT:-6081}
      UI_PASSWORD: ${UI_PASSWORD:-}
      UI_AUTH_USERNAME: ${UI_AUTH_USERNAME:-}
      UI_AUTH_PASSWORD: ${UI_AUTH_PASSWORD:-}
      UI_RATE_LIMIT_RPS: ${UI_RATE_LIMIT_RPS:-5}
      UI_RATE_LIMIT_BURST: ${UI_RATE_LIMIT_BURST:-20}
      UI_RATE_LIMIT_CONN: ${UI_RATE_LIMIT_CONN:-10}
      XVFB_WHD: ${XVFB_WHD:-1280x800x24}
      CONFIG_DIR: ${CONFIG_DIR:-/data/config}
      CONFIG_FILE: ${CONFIG_FILE:-/data/config/config.yaml}
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
